<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Future Gen Services</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1AAFB0;
    --teal-dark: #0e8080;
    --teal-light: #e0f7f7;
    --orange: #F47B20;
    --bg: #f5f7f8;
    --surface: #ffffff;
    --text: #0f1923;
    --muted: #6b7a8d;
    --border: #e2e8ee;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(26,175,176,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(244,123,32,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(15,25,35,0.07);
  }

  .card-header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
  }

  .logo-wrap img { height: 38px; display: block; }

  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .header-text p {
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .accent-bar {
    height: 3px;
    width: 40px;
    background: linear-gradient(90deg, var(--teal), var(--orange));
    border-radius: 99px;
    margin-top: 2px;
  }

  .card-body { padding: 1.75rem 2rem 2rem; }

  .screen { display: none; }
  .screen.active { display: block; }

  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(26,175,176,0.13);
    background: #fff;
  }
  .field input.error { border-color: #e05050; }
  .err-msg {
    font-size: 12px;
    color: #e05050;
    margin-top: 4px;
    display: none;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    margin-top: 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn svg { width: 16px; height: 16px; }

  .status-msg {
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
    color: var(--muted);
  }
  .status-msg.error { color: #e05050; }

  .greeting {
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }
  .greeting strong { color: var(--text); font-weight: 600; }

  .links-list { display: flex; flex-direction: column; gap: 10px; }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
  }
  .link-card:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
  }

  .link-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-teal { background: rgba(26,175,176,0.13); }
  .icon-orange { background: rgba(244,123,32,0.12); }
  .icon-navy { background: rgba(15,25,35,0.08); }

  .link-info { flex: 1; min-width: 0; }
  .link-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .qr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .qr-label {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  #qr-output canvas,
  #qr-output img {
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    body { padding: 1rem; align-items: flex-start; }
    .card-header, .card-body { padding-left: 1.25rem; padding-right: 1.25rem; }
  }
</style>
</head>

<script>
  async function submitForm() {
    var name = document.getElementById('f-name').value.trim();
    var email = document.getElementById('f-email').value.trim();
    var company = document.getElementById('f-company').value.trim();
    var statusEl = document.getElementById('status-msg');
    var btnEl = document.getElementById('submit-btn');
    var valid = true;

    ['name','email','company'].forEach(function(f) {
      document.getElementById('f-' + f).classList.remove('error');
      document.getElementById('err-' + f).style.display = 'none';
    });
    statusEl.textContent = '';
    statusEl.className = 'status-msg';

    if (!name) {
      document.getElementById('f-name').classList.add('error');
      document.getElementById('err-name').style.display = 'block';
      valid = false;
    }
    var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!emailOk) {
      document.getElementById('f-email').classList.add('error');
      document.getElementById('err-email').style.display = 'block';
      valid = false;
    }
    if (!company) {
      document.getElementById('f-company').classList.add('error');
      document.getElementById('err-company').style.display = 'block';
      valid = false;
    }
    if (!valid) return;

    btnEl.disabled = true;
    btnEl.textContent = 'Sending\u2026';

    try {
      var res = await fetch('https://formspree.io/f/mlgadljl', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, company: company })
      });
      if (res.ok) {
        showLinks(name);
      } else {
        throw new Error('failed');
      }
    } catch(e) {
      btnEl.disabled = false;
      btnEl.innerHTML = 'Continue <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      statusEl.textContent = 'Something went wrong. Please try again.';
      statusEl.classList.add('error');
    }
  }

  function showLinks(name) {
    var first = name.split(' ')[0];
    document.getElementById('greeting-text').innerHTML =
      'Welcome, <strong>' + first + '</strong>! Choose where you\'d like to go:';
    document.getElementById('header-title').textContent = 'Explore FGS';
    document.getElementById('header-sub').textContent = 'Select a destination below.';
    document.getElementById('screen-form').classList.remove('active');
    document.getElementById('screen-links').classList.add('active');
  }
</script>
</body>
</html>
